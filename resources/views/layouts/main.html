<!DOCTYPE html>
<html lang="en">
<head>
  <base href="{basepath}">
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{title}</title>
  <meta name="description" content="{description}" />
  <meta name="keywords" content="{keywords}" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="public/assets/css/style.css" />

  <!-- Bootstrap CSS -->
  <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome 6 -->
  <link href="public/assets/css/all.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="public/assets/js/jquery.min.js"></script>

  <!-- Bootstrap Bundle JS (con Popper incluido) -->
  <script src="public/assets/js/bootstrap.bundle.min.js"></script>

</head>
<body>

<header class="bg-primary text-white p-3">
  <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between">
    <h1 class="mb-2 mb-md-0">{title}</h1>

    <nav class="navbar navbar-expand-md p-0">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-white" href="{basepath}">Home</a>
          </li>
          <!-- @foreach virtual_pages as page -->
          <li class="nav-item">
            <a class="nav-link text-white" href="./page/{page.url}">{page.virtual_title}</a>
          </li>
          <!-- @endforeach -->
        </ul>
      </div>
    </nav>
  </div>
</header>

<main class="container my-4">

  <!-- @foreach virtual_pages as page -->
  <h2>{page.virtual_title}</h2>
  <p>{page.virtual_content}</p>
  <!-- @endforeach -->

</main>

<footer class="bg-light text-center py-3">
  &copy; Your Company. All rights reserved.
</footer>

</body>
</html>
