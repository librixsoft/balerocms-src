<!DOCTYPE html>
<html lang="en">
<head>
  <base href="{basepath}">
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{title}</title>
  <meta name="description" content="{description}" />
  <meta name="keywords" content="{keywords}" />

  <!-- Bootstrap CSS -->
  <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome 6 -->
  <link href="public/assets/css/all.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="public/assets/js/jquery.min.js"></script>

  <!-- Bootstrap Bundle JS (con Popper incluido) -->
  <script src="public/assets/js/bootstrap.bundle.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="public/assets/css/style.css" />

</head>
<body>

<!-- Navbar estático -->
<nav class="navbar navbar-expand-md">
  <div class="container">
    <a class="navbar-brand" href="{basepath}">{title}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{basepath}">Home</a>
        </li>
        <!-- @foreach virtual_pages as page -->
        <li class="nav-item">
          <a class="nav-link" href="./page/{page.url}">{page.virtual_title}</a>
        </li>
        <!-- @endforeach -->
      </ul>
    </div>
  </div>
</nav>

<!-- Hero Header con degradado azul -->
<header class="hero-header">
  <div class="hero-content">
    <h1>{title}</h1>
    <p class="slogan">Aquí va tu slogan inspirador</p>
  </div>
</header>


<!-- Main dinámico de páginas -->
<main class="container my-5">
  <!-- @foreach blocks as block -->
  <p>{block.content}</p>
  <!-- @endforeach -->
</main>

<!-- Footer -->
<footer class="text-center">
  <p>{footer}</p>
  <div class="social-icons">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
  </div>
</footer>

</body>
</html>
