<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{title} - {page}</title>
  <meta name="description" content="{description}" />
  <meta name="keywords" content="{keywords}" />
  <link rel="stylesheet" href="{basepath}/assets/css/style.css" />
  <style>
    /* Ejemplo básico de estilos */
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #004080;
      color: #fff;
      padding: 1rem;
    }
    nav ul {
      list-style: none;
      margin: 0; padding: 0;
      display: flex;
    }
    nav ul li {
      margin-right: 1rem;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }
    nav ul li a.active,
    nav ul li a:hover {
      text-decoration: underline;
    }
    main {
      padding: 1rem;
      max-width: 960px;
      margin: auto;
      background: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-height: 80vh;
    }
    footer {
      text-align: center;
      font-size: 0.9rem;
      padding: 1rem;
      background: #eee;
      color: #666;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <h1>{title}</h1>
  <nav>
    <!-- @foreach virtual_pages as page -->
    <ul>
      <a href="index.php?app=virtualPage&sr={page.url}">{page.virtual_title}</a><br>
    </ul>
    <!-- @endforeach -->
  </nav>
</header>

<main>

  <h1>{page.virtual_title}</h1>
  <p><em>{page.date}</em></p>

  <!-- @if page.virtual_content -->
  <div class="vp-content">
    {page.virtual_content}
  </div>
  <!-- @else -->
  <p>No hay contenido disponible.</p>
  <!-- @endif -->


</main>

<footer>
  &copy; {date('Y')} Your Company. All rights reserved.
</footer>

</body>
</html>
