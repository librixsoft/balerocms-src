<!DOCTYPE html>
<html class="no-js">
<head>
    <title>Edit Block - {mod_name}</title>
    <base href="{basepath}">
    <link href="favicon.ico" rel="shortcut icon">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <!-- Bootstrap 5 -->
    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link href="public/assets/css/dashboard.css.css" media="screen" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link href="public/assets/css/all.min.css" rel="stylesheet">

    <!-- Summernote CSS -->
    <link href="public/assets/css/summernote.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="public/assets/js/jquery.min.js"></script>

    <!-- Bootstrap Bundle JS -->
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>

    <!-- Summernote JS -->
    <script src="public/assets/js/summernote.min.js"></script>

</head>
<body>

<%-- @include "admin/includes/navbar.html" -->

<div class="container-fluid">
    <div class="row">

        <%-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
            <div class="row mb-3">

                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Edit Block</h5>
                    </div>
                    <div class="card-body">

                        <form action="./admin/blocks/edit/{block.id}" method="post">
                            <div class="mb-3">
                                <label class="form-label" for="block_name">Name</label>
                                <input class="form-control" id="block_name" name="name" required type="text"
                                       value="{block.name}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="sort_order">Sort Order</label>
                                <input class="form-control" id="sort_order" name="sort_order" required
                                       type="number" value="{block.sort_order}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="block_content">Content</label>
                                <textarea class="form-control summernote" id="block_content" name="content">{block.content}</textarea>
                            </div>

                            <div class="text-end">
                                <button class="btn btn-sm btn-info" type="submit">
                                    <i class="fas fa-save"></i> Save
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

                <script>
                    $(document).ready(function () {
                        $('.summernote').summernote({
                            height: 350,
                            callbacks: {
                                onImageUpload: function (files) {
                                    sendFile(files[0]);
                                }
                            }
                        });

                        function sendFile(file) {
                            var data = new FormData();
                            data.append("file", file);
                            $.ajax({
                                data: data,
                                type: "POST",
                                url: "{basepath}admin/uploader",
                                cache: false,
                                contentType: false,
                                processData: false,
                                success: function (url) {
                                    $('.summernote').summernote('insertImage', url);
                                }
                            });
                        }
                    });
                </script>

            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script src="public/assets/js/scripts.js"></script>
</body>
</html>
