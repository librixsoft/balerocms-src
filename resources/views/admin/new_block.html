<!DOCTYPE html>
<html class="no-js">
<head>
    <title>New Block - {mod_name}</title>
    <base href="{basepath}">
    <meta charset="utf-8">

    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="public/assets/css/dashboard.css" rel="stylesheet">
    <link href="public/assets/css/all.min.css" rel="stylesheet">
    <link href="public/assets/css/summernote.min.css" rel="stylesheet">

    <script src="public/assets/js/jquery.min.js"></script>
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>
    <script src="public/assets/js/summernote.min.js"></script>
</head>
<body>

<%-- @include "admin/includes/navbar.html" -->
<div class="container-fluid">
    <div class="row">
        <%-- @include "admin/includes/sidebar.html" -->
        <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
            <div class="row mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">New Block</h5>
                    </div>
                    <div class="card-body">
                        <form action="./admin/blocks/new" method="post">
                            <div class="mb-3">
                                <label class="form-label" for="block_name">Name</label>
                                <input class="form-control" id="block_name" name="name" required type="text" value="">
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="sort_order">Sort Order</label>
                                <input class="form-control" id="sort_order" name="sort_order" required
                                       type="number" value="{next_sort_order}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="block_content">Content</label>
                                <textarea class="form-control summernote" id="block_content" name="content"></textarea>
                            </div>

                            <div class="text-end">
                                <button class="btn btn-sm btn-success" type="submit">
                                    <i class="fas fa-plus"></i> Create
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <script>
                    $(document).ready(function () {
                        $('.summernote').summernote({
                            height: 350,
                            callbacks: {
                                onImageUpload: function (files) {
                                    var data = new FormData();
                                    data.append("file", files[0]);
                                    $.ajax({
                                        url: "{basepath}admin/uploader",
                                        type: "POST",
                                        data: data,
                                        cache: false,
                                        contentType: false,
                                        processData: false,
                                        success: function (url) {
                                            $('.summernote').summernote('insertImage', url);
                                        }
                                    });
                                }
                            }
                        });
                    });
                </script>

            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script src="public/assets/js/scripts.js"></script>
</body>
</html>
