<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="expires" content="0"/>
    <meta http-equiv="pragma" content="no-cache"/>

    <title>Login - {mod_name}</title>
    <base href="{basepath}">
    <link rel="shortcut icon" href="favicon.ico">

    <!-- Bootstrap CSS -->
    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link href="public/assets/css/login.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link href="public/assets/css/all.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="public/assets/js/jquery.min.js"></script>

    <!-- Bootstrap Bundle (incluye Popper) -->
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light" style="min-height:100vh; padding-top:50px;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            
            <div class="card shadow-sm">
                <div class="card-header text-center">
                    <img src="public/assets/images/admin/logo.png" class="logo img-fluid" style="max-height:80px;">
                </div>
                <div class="card-body">

                    <form method="POST" action="./login">
                        <div class="mb-3">
                            <input type="text" id="username" name="usr" class="form-control" placeholder="{login.username}" >
                        </div>

                        <div class="mb-3">
                            <input type="password" id="password" name="pwd" class="form-control" placeholder="{login.password}" >
                        </div>

                        <%-- @if login_error -->
                        <div class="alert alert-danger alert-dismissible fade show" role="alert" id="alert-login_error">
                            <i class="fas fa-exclamation-triangle"></i> {login_error}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" onclick="deleteMessage('login_error')"></button>
                        </div>
                        <%-- @endif -->

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" name="login">
                                <i class="fas fa-sign-in-alt"></i> {login.submit}
                            </button>
                        </div>
                    </form>

                </div>

                <div class="card-footer text-center small">
                    <a href="./">{login.back}</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="public/assets/js/notification.js"></script>

</body>
</html>
