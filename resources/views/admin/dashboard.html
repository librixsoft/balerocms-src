<!DOCTYPE html>
<html class="no-js">
<head>

    <title>Admin Home Page - {mod_name}</title>
    <link href="favicon.ico" rel="shortcut icon">
    <!--  basepath -->
    <base href="{basepath}">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <!-- Bootstrap CSS -->
    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link href="public/assets/css/dashboard.css" media="screen" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link href="public/assets/css/all.min.css" rel="stylesheet">

    <!-- Summernote CSS -->
    <link href="public/assets/css/summernote.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="public/assets/js/jquery.min.js"></script>

    <!-- Bootstrap Bundle JS (con Popper incluido) -->
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>

    <!-- Summernote JS -->
    <script src="public/assets/js/summernote.min.js"></script>
</head>
<body>

<%-- @include "admin/includes/navbar.html" -->

<div class="container-fluid">
    <div class="row">

        <!-- Incluimos el sidebar aquí -->
        <%-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
            <div class="row mb-3">

                <!-- dashboard dinamic content -->
                <!-- block -->
                <div class="card">
                    <div class="card-header">
                        <ul class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="./admin">Dashboard</a></li>
                            <li aria-current="page" class="breadcrumb-item active">{mod_name}</li>
                        </ul>
                    </div>
                    <div class="card-body">

                        <form action="./admin/settings" class="row g-3" method="POST">
                            <fieldset>
                                <legend>{lbl_settings}</legend>

                                <div class="col-md-6">
                                    <label class="form-label" for="core">Core</label>
                                    <input class="form-control" id="core" name="core" readonly type="text"
                                           value="{core_version}">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label" for="language">{lbl_language}</label>
                                    <select class="form-select" id="language" name="language">
                                        <%-- @foreach languages as code => name -->
                                        <%-- @if defaultLanguage == code -->
                                        <option selected value="{code}">{name}</option>
                                        <%-- @else -->
                                        <option value="{code}">{name}</option>
                                        <%-- @endif -->
                                        <%-- @endforeach -->
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label" for="theme">{lbl_theme}</label>
                                    <select class="form-select" id="theme" name="theme">
                                        <%-- @foreach themes as t -->
                                        <%-- @if defaultTheme == t -->
                                        <option selected value="{t}">{t}</option>
                                        <%-- @else -->
                                        <option value="{t}">{t}</option>
                                        <%-- @endif -->
                                        <%-- @endforeach -->
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label" for="typeahead">{lbl_title}</label>
                                    <input class="form-control" data-provide="typeahead" id="typeahead" name="title"
                                           type="text" value="{txt_title}">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label" for="keywords">{lbl_keywords}</label>
                                    <input class="form-control" id="keywords" name="keywords" type="text"
                                           value="{txt_keywords}">
                                </div>

                                <div class="col-12">
                                    <label class="form-label" for="description">{lbl_description}</label>
                                    <textarea class="form-control" id="description" name="description"
                                              style="height: 200px;">{txt_description}</textarea>
                                </div>

                                <div class="col-12">
                                    <label class="form-label" for="footer">{lbl_footer}</label>
                                    <textarea class="form-control" id="footer" name="footer" style="height: 200px;">{txt_footer}</textarea>
                                </div>

                                <div class="col-12">
                                    <button class="btn btn-primary" name="submit" type="submit">Save changes</button>
                                    <button class="btn btn-secondary" name="cancel" type="reset">Cancel</button>
                                </div>
                            </fieldset>
                        </form>

                    </div>
                </div>
                <!-- /block -->
                <!-- end dashboard dinamic content --->

            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script src="public/assets/js/scripts.js"></script>
</body>
</html>
