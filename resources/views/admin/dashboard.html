<!DOCTYPE html>
<html class="no-js">
<head>

    <title>Admin Home Page - {mod_name}</title>
    <!--  basepath -->
    <base href="{basepath}">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!-- Bootstrap CSS -->
    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link href="public/assets/css/styles.css" rel="stylesheet" media="screen">

    <!-- Font Awesome 6 -->
    <link href="public/assets/css/all.min.css" rel="stylesheet">

    <!-- Summernote CSS -->
    <link href="public/assets/css/summernote.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="public/assets/js/jquery.min.js"></script>

    <!-- Bootstrap Bundle JS (con Popper incluido) -->
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>

    <!-- Summernote JS -->
    <script src="public/assets/js/summernote.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="./">
            <img src="public/assets/images/admin/logo_top.png" alt="Logo" style="height: 30px;">
        </a>
        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMain"
                aria-controls="navbarMain"
                aria-expanded="false"
                aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="./admin">Dashboard</a>
                </li>
                <li class="nav-item dropdown">
                    <a
                            class="nav-link dropdown-toggle"
                            href="#"
                            id="previewDropdown"
                            role="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                    >
                        Preview
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="previewDropdown">
                        <li><a class="dropdown-item" href="./" target="_blank">Front-End</a></li>
                    </ul>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item dropdown">
                    <a
                            class="nav-link dropdown-toggle"
                            href="#"
                            id="userDropdown"
                            role="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                    >
                        <i class="fas fa-user"></i> {username} ({email})
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="./logout">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Incluimos el sidebar aquí -->
        <!-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
            <div class="row mb-3">

                <!-- dashboard dinamic content -->
                <!-- block -->
                <div class="card">
                    <div class="card-header">
                        <ul class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="./admin">Dashboard</a></li>
                            <li class="breadcrumb-item active" aria-current="page">{mod_name}</li>
                        </ul>
                    </div>
                    <div class="card-body">

                        <form method="POST" action="./admin/settings" class="row g-3">
                            <fieldset>
                                <legend>{lbl_settings}</legend>

                                <div class="col-md-6">
                                    <label for="core" class="form-label">Core</label>
                                    <input type="text" id="core" name="core" class="form-control" value="{core_version}" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="theme" class="form-label">{lbl_theme}</label>
                                    <select id="theme" name="theme" class="form-select">
                                        <!-- @foreach themes as t -->
                                        <!-- @if defaultTheme == t.value -->
                                        <option value="{t.value}" selected>{t.label}</option>
                                        <!-- @else -->
                                        <option value="{t.value}">{t.label}</option>
                                        <!-- @endif -->
                                        <!-- @endforeach -->
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="typeahead" class="form-label">{lbl_title}</label>
                                    <input type="text" id="typeahead" name="title" class="form-control" value="{txt_title}" data-provide="typeahead">
                                </div>

                                <div class="col-md-6">
                                    <label for="keywords" class="form-label">{lbl_keywords}</label>
                                    <input type="text" id="keywords" name="keywords" class="form-control" value="{txt_keywords}">
                                </div>

                                <div class="col-12">
                                    <label for="description" class="form-label">{lbl_description}</label>
                                    <textarea id="description" name="description" class="form-control" placeholder="{lbl_insert}" style="height: 200px;">{txt_description}</textarea>
                                </div>

                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary" name="submit">Save changes</button>
                                    <button type="reset" class="btn btn-secondary" name="cancel">Cancel</button>
                                </div>
                            </fieldset>
                        </form>

                    </div>
                </div>
                <!-- /block -->
                <!-- end dashboard dinamic content --->

            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script src="public/assets/js/scripts.js"></script>
</body>
</html>
