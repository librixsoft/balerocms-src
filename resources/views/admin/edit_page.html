<!DOCTYPE html>
<html class="no-js">
<head>
    <title>Admin Edit Page - {mod_name}</title>
    <base href="{basepath}">
    <link href="favicon.ico" rel="shortcut icon">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <!-- Bootstrap CSS -->
    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="public/assets/css/dashboard.css" media="screen" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link href="public/assets/css/all.min.css" rel="stylesheet">

    <!-- Summernote CSS -->
    <link href="public/assets/css/summernote.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="public/assets/js/jquery.min.js"></script>
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>
    <script src="public/assets/js/summernote.min.js"></script>
</head>
<body>

<%-- @include "admin/includes/navbar.html" -->

<div class="container-fluid">
    <div class="row">
        <%-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 px-md-4" id="content">
            <div class="mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">{lbl_edit_page}</h5>
                    </div>
                    <div class="card-body">
                        <form action="./admin/pages/edit/{page.id}" method="POST">
                            <fieldset>
                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="virtual_title">{lbl_title}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="virtual_title" name="virtual_title" required
                                               type="text" value="{page.virtual_title}">
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="static_url">{lbl_static_url}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="static_url" name="static_url" readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                                               value="{page.static_url}">
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="virtual_content">{lbl_content}</label>
                                    <div class="col-sm-10">
                                        <textarea class="summernote"
                                                  name="virtual_content">{page.virtual_content}</textarea>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="visible">{lbl_visible}</label>
                                    <div class="col-sm-10">
                                        <select class="form-select w-auto" id="visible" name="visible">
                                            <option value="1" {page.visible_selected}>{enabled}</option>
                                            <option value="0" {page.hidden_selected}>{disabled}</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label class="col-sm-2 col-form-label" for="created_at">{lbl_date}</label>
                                    <div class="col-sm-10">
                                        <input class="form-control" id="created_at" name="created_at" readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;" type="text"
                                               value="{page.created_at}">
                                    </div>
                                </div>

                                <div class="d-flex justify-content-start">
                                    <button class="btn btn-primary me-2" name="submit" type="submit">
                                        <i class="fas fa-check"></i> {btn_save}
                                    </button>
                                    <a class="btn btn-secondary" href="{basepath}admin/pages">Cancel</a>
                                </div>

                            </fieldset>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script>
    $(document).ready(function () {
        $('.summernote').summernote({
            height: 350,
            callbacks: {
                onImageUpload: function (files) {
                    sendFile(files[0]);
                }
            }
        });

        function sendFile(file) {
            var data = new FormData();
            data.append("file", file);
            $.ajax({
                data: data,
                type: "POST",
                url: "{basepath}admin/uploader",
                cache: false,
                contentType: false,
                processData: false,
                success: function (url) {
                    $('.summernote').summernote('insertImage', url);
                }
            });
        }

        // Auto-generar slug para static_url al modificar título
        $('#virtual_title').on('input', function () {
            var title = $(this).val();
            var slug = title.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .trim()
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
            $('#static_url').val(slug);
        });
    });
</script>

<script src="public/assets/js/scripts.js"></script>
</body>
</html>
