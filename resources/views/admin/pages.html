<!DOCTYPE html>
<html class="no-js">
<head>
    <title>Admin Home Page - {mod_name}</title>
    <!-- basepath -->
    <base href="{basepath}">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!-- Bootstrap 5 -->
    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link href="public/assets/css/styles.css" rel="stylesheet" media="screen">

    <!-- Font Awesome 6 -->
    <link href="public/assets/css/all.min.css" rel="stylesheet">

    <!-- Summernote CSS -->
    <link href="public/assets/css/summernote.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="public/assets/js/jquery.min.js"></script>

    <!-- Bootstrap Bundle JS (con Popper incluido) -->
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>

    <!-- Summernote JS -->
    <script src="public/assets/js/summernote.min.js"></script>

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="./">
            <img src="public/assets/images/admin/logo_top.png" alt="Logo" style="height: 30px;">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="./admin">Dashboard</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="previewDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">Preview</a>
                    <ul class="dropdown-menu" aria-labelledby="previewDropdown">
                        <li><a class="dropdown-item" href="./" target="_blank">Front-End</a></li>
                    </ul>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user"></i> {username} ({email})
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="./logout">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 ms-sm-auto col-lg-9 px-md-4" id="content">
            <div class="row mb-3">

                <!-- block -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Edit Page</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>{lbl_title}</th>
                                    <th>{lbl_action}</th>
                                </tr>
                                </thead>
                                <tbody>
                                <!-- @foreach pages as page -->
                                <tr>
                                    <td>{page.virtual_title}</td>
                                    <td>
                                        <a href="./admin/pages/edit/{page.id}" class="btn btn-sm btn-info">
                                            <i class="fas fa-pencil-alt"></i> {lbl_edit}
                                        </a>
                                        <a href="./admin/pages/delete/{page.id}" class="btn btn-sm btn-danger"
                                           onclick="return confirm('{lbl_confirm_delete}')">
                                            <i class="fas fa-trash"></i> {lbl_delete}
                                        </a>
                                    </td>
                                </tr>
                                <!-- @endforeach -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <!-- /block -->

                <script>
                    $(document).ready(function() {
                        $('.summernote').summernote({
                            height: 350,
                            callbacks: {
                                onImageUpload: function(files) {
                                    sendFile(files[0]);
                                }
                            }
                        });
                        function sendFile(file) {
                            var data = new FormData();
                            data.append("file", file);
                            $.ajax({
                                data: data,
                                type: "POST",
                                url: "{basepath}admin/uploader",
                                cache: false,
                                contentType: false,
                                processData: false,
                                success: function(url) {
                                    $('.summernote').summernote('insertImage', url);
                                }
                            });
                        }
                    });
                </script>

            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script src="public/assets/js/scripts.js"></script>
</body>
</html>
