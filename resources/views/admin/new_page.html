<!DOCTYPE html>
<html class="no-js">
<head>
    <title>Admin New Page - {mod_name}</title>
    <!--  basepath -->
    <base href="{basepath}">
    <link rel="shortcut icon" href="favicon.ico">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!-- Bootstrap CSS -->
    <link href="public/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="public/assets/css/dashboard.css" rel="stylesheet" media="screen">

    <!-- Font Awesome 6 -->
    <link href="public/assets/css/all.min.css" rel="stylesheet">

    <!-- Summernote CSS -->
    <link href="public/assets/css/summernote.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="public/assets/js/jquery.min.js"></script>

    <!-- Bootstrap Bundle JS (con Popper incluido) -->
    <script src="public/assets/js/bootstrap.bundle.min.js"></script>

    <!-- Summernote JS -->
    <script src="public/assets/js/summernote.min.js"></script>
</head>
<body>

<!-- @include "admin/includes/navbar.html" -->

<div class="container-fluid">
    <div class="row">
        <!-- Incluimos el sidebar aquí -->
        <!-- @include "admin/includes/sidebar.html" -->

        <main class="col-md-9 px-md-4" id="content">
            <div class="mb-3">
                <!-- block -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">{new_page}</h5>
                    </div>
                    <div class="card-body">

                        <form method="POST" action="./admin/pages/new">
                            <fieldset>
                                <div class="mb-3 row">
                                    <label for="virtual_title" class="col-sm-2 col-form-label">{lbl_title}</label>
                                    <div class="col-sm-10">
                                        <input type="text" class="form-control" id="virtual_title" name="virtual_title" required>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="static_url" class="col-sm-2 col-form-label">{lbl_static_url}</label>
                                    <div class="col-sm-10">
                                        <input type="text" class="form-control" id="static_url" name="static_url" readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;" placeholder="Slug will be auto-generated">
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="virtual_content" class="col-sm-2 col-form-label">{lbl_content}</label>
                                    <div class="col-sm-10">
                                        <textarea class="summernote" name="virtual_content"></textarea>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="visible" class="col-sm-2 col-form-label">{lbl_visible}</label>
                                    <div class="col-sm-10">
                                        <select id="visible" name="visible" class="form-select w-auto">
                                            <option value="1" selected>{enabled}</option>
                                            <option value="0">{disabled}</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3 row">
                                    <label for="date" class="col-sm-2 col-form-label">{lbl_date}</label>
                                    <div class="col-sm-10">
                                        <input type="text" class="form-control" id="date" name="date" value="{current_date}" readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;">
                                    </div>
                                </div>

                                <div class="d-flex justify-content-start">
                                    <button type="submit" class="btn btn-primary me-2" name="submit"><i class="fas fa-check"></i> {btn_add}</button>
                                    <a href="{basepath}admin/pages" class="btn btn-secondary">Cancel</a>
                                </div>

                            </fieldset>
                        </form>

                    </div>
                </div>
                <!-- /block -->
            </div>
        </main>
    </div>
    <hr>
    <footer>
        <p>Powered by <a href="#">Balero CMS</a>.</p>
    </footer>
</div>

<script>
    $(document).ready(function() {
        $('.summernote').summernote({
            height: 350,
            callbacks: {
                onImageUpload: function(files) {
                    sendFile(files[0]);
                }
            }
        });

        function sendFile(file) {
            var data = new FormData();
            data.append("file", file);
            $.ajax({
                data: data,
                type: "POST",
                url: "{basepath}admin/uploader",
                cache: false,
                contentType: false,
                processData: false,
                success: function(url) {
                    $('.summernote').summernote('insertImage', url);
                }
            });
        }

        // Auto-generar slug para static_url al escribir título
        $('#virtual_title').on('input', function() {
            var title = $(this).val();
            var slug = title.toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .trim()
                .replace(/[\s_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
            $('#static_url').val(slug);
        });
    });
</script>

<script src="public/assets/js/scripts.js"></script>
</body>
</html>
