<!DOCTYPE html>
<html class="no-js">
<head>
  <meta charset="utf-8">
  <title>{page} - {title}</title>
  <base href="{basepath}">
  <meta name="description" content="{description}">
  <meta name="keywords" content="{keywords}">
  <meta name="author" content="Balero CMS (c) 2013-2014.">

  <link href="themes/tundra/bootstrap/css/bootstrap.min.css" rel="stylesheet" media="screen">

  <style>
    body {
      background-color: #f5f5f5;
    }
    #wizard-container {
      max-width: 800px;
      margin: 40px auto;
      background-color: #e9ecef; /* gris clarito */
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .navbar-inner {
      background-color: #f5f5f5;
      border-radius: 4px 4px 0 0;
      border: 1px solid #ddd;
      padding: 8px 15px;
    }
    .nav-tabs > li > a {
      padding: 8px 15px;
      font-weight: 600;
    }
    .tab-content {
      background: #fff;
      margin-top: 20px;
      border: 1px solid #ddd;
      border-top: none;
      padding: 20px;
      border-radius: 0 0 6px 6px;
    }
  </style>

  <script src="themes/tundra/vendors/jquery-1.9.1.js"></script>
  <script src="themes/tundra/bootstrap/js/bootstrap.min.js"></script>
  <script src="themes/tundra/vendors/jquery.bootstrap.wizard.min.js"></script>

</head>
<body>

<div id="wizard-container">
  <div class="row-fluid section">

    <!-- @if title -->
    <div class="block" style="margin-top: 20px;">
      <div class="navbar navbar-inner block-header">
        <div class="clearfix"></div>
        <div class="padd-top" style="margin-top: 10px;">
          <form class="form-inline" method="POST" action="index.php?app=installer&sr=progressBar">
            <input type="submit" class="btn btn-success btn-large" value="{btn_install}" name="submit">
          </form>
        </div>
      </div>
    </div>
    <!-- @endif -->

    <div class="block">
      <div class="block-content collapse in">
        <div class="span12">
          <div id="rootwizard">
            <div class="navbar navbar-inner" style="margin-bottom: 0;">
              <ul class="nav nav-tabs" style="margin: 0; padding-left: 0;">
                <li class="active"><a href="#tab1" data-toggle="tab"><img src="site/apps/installer/html/images/check-icon.png"> {lbl_dbconfig}</a></li>
                <li><a href="#tab2" data-toggle="tab"><img src="site/apps/installer/html/images/check-icon.png"> {lbl_siteinfo}</a></li>
                <li><a href="#tab3" data-toggle="tab"><img src="site/apps/installer/html/images/check-icon.png"> {lbl_adminconfig}</a></li>
              </ul>
            </div>

            <div class="tab-content">
              <!-- TAB 1 -->
              <div class="tab-pane active" id="tab1">
                <form class="form-horizontal" method="POST" action="index.php?app=installer&sr=formDBInfo">
                  <fieldset>
                    <div class="control-group">
                      <label class="control-label" for="dbhost">{lbl_dbhost}</label>
                      <div class="controls">
                        <input name="dbhost" class="input-xlarge" id="dbhost" type="text" value="{txt_dbhost}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="dbuser">{lbl_dbusername}</label>
                      <div class="controls">
                        <input name="dbuser" class="input-xlarge" id="dbuser" type="text" value="{txt_dbuser}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="dbpass">{lbl_dbpass}</label>
                      <div class="controls">
                        <input name="dbpass" class="input-xlarge" id="dbpass" type="password" value="{txt_dbpass}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="dbname">{lbl_dbname}</label>
                      <div class="controls">
                        <input name="dbname" class="input-xlarge" id="dbname" type="text" value="{txt_dbname}">
                        <p class="help-block">{lbl_dbname_note}</p>
                      </div>
                    </div>
                    <div class="control-group">
                      <div class="controls">
                        <button type="submit" name="submit" class="btn btn-primary">{btn_save}</button>
                      </div>
                    </div>
                  </fieldset>
                </form>
              </div>

              <!-- TAB 2 -->
              <div class="tab-pane" id="tab2">
                <form class="form-horizontal" method="POST" action="index.php?app=installer&sr=formSiteInfo">
                  <fieldset>
                    <div class="control-group">
                      <label class="control-label" for="basepath">{lbl_basepath}</label>
                      <div class="controls">
                        <input name="basepath" class="input-xlarge" id="basepath" type="text" value="{txt_basepath}">
                        <p class="help-block">{lbl_basepath_note}</p>
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="title">{lbl_title}</label>
                      <div class="controls">
                        <input name="title" class="input-xlarge" id="title" type="text" value="{txt_title}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="url">{lbl_url}</label>
                      <div class="controls">
                        <input name="url" class="input-xlarge" placeholder="http://" id="url" type="text" value="{txt_url}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="keywords">{lbl_keywords}</label>
                      <div class="controls">
                        <input name="keywords" class="input-xlarge" id="keywords" type="text" value="{txt_keywords}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="description">{lbl_description}</label>
                      <div class="controls">
                        <textarea name="description" class="input-xlarge" id="description" style="height: 200px;">{txt_description}</textarea>
                      </div>
                    </div>
                    <div class="control-group">
                      <div class="controls">
                        <button type="submit" name="submit" class="btn btn-primary">{btn_save}</button>
                      </div>
                    </div>
                  </fieldset>
                </form>
              </div>

              <!-- TAB 3 -->
              <div class="tab-pane" id="tab3">
                <form class="form-horizontal" method="POST" action="index.php?app=installer&sr=formadminInfo">
                  <fieldset>
                    <div class="control-group">
                      <label class="control-label" for="username">{lbl_administrator}</label>
                      <div class="controls">
                        <input name="username" class="input-xlarge" id="username" type="text" value="{txt_administrator}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="passwd">{lbl_pass}</label>
                      <div class="controls">
                        <input name="passwd" class="input-xlarge" id="passwd" type="password" value="">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="passwd2">{lbl_retype}</label>
                      <div class="controls">
                        <input name="passwd2" class="input-xlarge" id="passwd2" type="password" value="">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="firstname">{lbl_firstname}</label>
                      <div class="controls">
                        <input name="firstname" class="input-xlarge" id="firstname" type="text" value="{txt_firstname}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="lastname">{lbl_lastname}</label>
                      <div class="controls">
                        <input name="lastname" class="input-xlarge" id="lastname" type="text" value="{txt_lastname}">
                      </div>
                    </div>
                    <div class="control-group">
                      <label class="control-label" for="email">{lbl_email}</label>
                      <div class="controls">
                        <input name="email" class="input-xlarge" id="email" type="text" value="{txt_email}">
                      </div>
                    </div>
                    <div class="control-group">
                      <div class="controls">
                        <button type="submit" name="submit" class="btn btn-primary">{btn_save}</button>
                      </div>
                    </div>
                  </fieldset>
                </form>
              </div>
            </div> <!-- /.tab-content -->
          </div> <!-- /#rootwizard -->
        </div> <!-- /.span12 -->
      </div> <!-- /.block-content -->
    </div> <!-- /.block -->

  </div> <!-- /.row-fluid -->
</div> <!-- /#wizard-container -->

<script>
  $(function() {
    $('#rootwizard').bootstrapWizard({
      onTabShow: function(tab, navigation, index) {
        var $total = navigation.find('li').length;
        var $current = index + 1;
        var $percent = ($current / $total) * 100;
        $('#rootwizard').find('.bar').css({width: $percent + '%'});
        if ($current >= $total) {
          $('#rootwizard').find('.pager .next').hide();
          $('#rootwizard').find('.pager .finish').show().removeClass('disabled');
        } else {
          $('#rootwizard').find('.pager .next').show();
          $('#rootwizard').find('.pager .finish').hide();
        }
      }
    });
    $('#rootwizard .finish').click(function() {
      alert('Finished!, Starting over!');
      $('#rootwizard').find("a[href*='tab1']").trigger('click');
    });
  });
</script>

</body>
</html>
